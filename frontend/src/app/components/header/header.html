<header class="header">
  <div class="brand-block">
    <h1 class="brand-title">SmartPath</h1>
  </div>

  <div class="header-actions">
    <a routerLink="/home" class="ghost-button">Home</a>
    <a routerLink="/week" class="ghost-button">Week</a>

    @if (auth.isAuthenticated()) {
      <app-ai-assistant />
      <button class="ghost-button" (click)="logout()">Log out</button>
    } @else {
      <a routerLink="/login" class="ghost-button">Log in</a>
    }
  </div>
</header>
